<!-- START OF FULL HTML DOCUMENT -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rugby Game Tracker</title>

<style>
body{font-family:Arial,sans-serif;background:#f7f7f7;padding:20px;max-width:800px;margin:auto;}
h1,h2,h3{text-align:center;}
input,button,select{font-size:16px;padding:6px;margin:5px 0;width:100%;box-sizing:border-box;}
.section{margin-top:20px;}
.stat-button{font-size:13px;margin:4px;padding:8px 10px;background-color:#1976d2;color:white;border:none;border-radius:5px;width:100%;height:40px;display:flex;align-items:center;justify-content:center;}
.stat-button:hover{background-color:#145ca8;}
.yellow-button{background-color:#fdd835;color:black;}
.stat-button:active{background-color:#145ca8;}
.summary{background:#fff;padding:10px;margin-top:10px;border:1px solid #ccc;}
.reset-btn,.undo-btn{background:#d32f2f;color:white;height:40px;}
.share-btn{background:#25d366;color:white;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:40px;}
.whatsapp-icon{width:20px;height:20px;}
.button-container{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.undo-reset-container{display:flex;gap:10px;margin-bottom:10px;}
.undo-reset-container button{flex:1;}
.yellow-card-timers{margin-top:10px;}
.yellow-timer-box{background-color:#fff8e1;border:1px solid #fbc02d;padding:10px;margin-bottom:10px;border-radius:5px;}
.yellow-timer-box strong{display:block;margin-bottom:5px;}
.timer-controls{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:10px;}
.match-timer{font-size:20px;font-weight:bold;background-color:#eeeeee;border:2px solid #ccc;padding:10px 20px;border-radius:8px;min-width:90px;text-align:center;transition:background-color 0.5s,color 0.5s;}
.negative-time{color:red;animation:flash 1s infinite;}
@keyframes flash{0%,100%{background-color:#fff0f0;}50%{background-color:#ffcccc;}}
</style>
</head>

<body>

<h1>FHHS U15 Rugby Tracker</h1>

<div class="section">
<label>Home Team:</label>
<input type="text" id="homeTeam" placeholder="Enter home team"/>

<label>Away Team:</label>
<input type="text" id="awayTeam" placeholder="Enter away team"/>

<label>Date:</label>
<input type="date" id="gameDate"/>

<label>Home Team Score:</label>
<input type="text" id="homeScore" placeholder="Score for Home Team"/>

<label>Away Team Score:</label>
<input type="text" id="awayScore" placeholder="Score for Away Team"/>
</div>

<div class="section">
<div class="timer-controls">
<div id="matchTimer1" class="match-timer">25:00</div>
<button class="stat-button" onclick="startMatchCountdown('matchTimer1')">1st Half Start</button>
</div>
</div>

<div class="section">
<div class="timer-controls">
<div id="matchTimer2" class="match-timer">25:00</div>
<button class="stat-button" onclick="startMatchCountdown('matchTimer2')">2nd Half Start</button>
</div>
</div>

<div class="section">
<h2>Infringements</h2>
<div class="button-container" id="penaltyButtons"></div>
</div>

<div class="section">
<h2>Other Stats</h2>
<div class="button-container" id="otherButtons"></div>
</div>

<div class="section">

<div class="undo-reset-container">
<button class="stat-button undo-btn" onclick="undoLast()">Undo</button>
<button class="stat-button reset-btn" onclick="resetStats()">Reset All</button>
</div>

<div class="yellow-card-timers" id="yellowCardTimerContainer"></div>

<h2>Summary</h2>
<div class="summary" id="summary"></div>

<button class="stat-button share-btn" onclick="shareSummary()">
<img src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png" class="whatsapp-icon"/>
Share via WhatsApp
</button>

</div>

<script>

const penalties=["Offside","High Tackle","Hands In","Not Releasing","Holding On","Side Entry","Not Rolling","Off Feet","Falling Over","Double Movement","Collapsing","Early Scrum Push PK","Early Scrum Push FK"];
const otherStats=["Knock-ons","Own Lineouts Won","Own Lineouts Lost","Own Scrums Won","Own Scrums Lost","Opp Lineouts Won","Opp Scrums Won"];
const playerNames=["Blake Willis","Bradley Zimbizi", "Caleb Gibson", "Daniel Wichall", "Ethan Wadsworth", "Emmanuel Simbo", 
    "Gabriel Mitchell", "Greg Psvura", "Jack Kershaw", "Juan Damon", 
    "Jude Heeger", "Kai Gebhard", "Kgosta Leon Jack", "Leo Pera", "Logan Tomlinson", "Michael Page",
    "Michael Theron", "Mohammad Hassen-Parker", "Neakail Wessels", "Noeh Oellerman", "Owen Widelski",
    "Paballo Sehlako", "Rushtun Dickson", "Ryan Anderson", "Sanchez Manjinga",
    "Sim Stephenson", "Tafara Madanire", "Zachary Warncke"];

const stats={},actionHistory=[],yellowCards=[],yellowTimers=[],matchIntervals={};

function loadState(){

const saved=localStorage.getItem("rugbyTrackerState");
if(!saved)return;

const state=JSON.parse(saved);

["homeTeam","awayTeam","gameDate","homeScore","awayScore"].forEach(id=>{
document.getElementById(id).value=state[id]||"";
});

Object.assign(stats,state.stats||{});

yellowCards.push(...(state.yellowCards||[]));

if(state.summaryHTML){
document.getElementById("summary").innerHTML=state.summaryHTML;
}

updateSummary();

}

function saveState(){

const state={
homeTeam:document.getElementById("homeTeam").value,
awayTeam:document.getElementById("awayTeam").value,
gameDate:document.getElementById("gameDate").value,
homeScore:document.getElementById("homeScore").value,
awayScore:document.getElementById("awayScore").value,
stats,
yellowCards,
summaryHTML:document.getElementById("summary").innerHTML
};

localStorage.setItem("rugbyTrackerState",JSON.stringify(state));

}

function updateSummary(){

const homeTeam=document.getElementById("homeTeam").value||"Home";
const awayTeam=document.getElementById("awayTeam").value||"Away";
const homeScore=document.getElementById("homeScore").value||"0";
const awayScore=document.getElementById("awayScore").value||"0";
const gameDate=document.getElementById("gameDate").value||"N/A";

let summary=`<strong>Fixture:</strong> ${homeTeam} vs ${awayTeam}<br>`;
summary+=`<strong>Date:</strong> ${gameDate}<br>`;
summary+=`<strong>Final Score:</strong> ${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}<br><br>`;

summary+=`<strong>Infringements:</strong><br>`;
penalties.forEach(p=>summary+=`${p}: ${stats[p]||0}<br>`);

summary+=`<br><strong>Other Stats:</strong><br>`;
otherStats.forEach(s=>summary+=`${s}: ${stats[s]||0}<br>`);

summary+=`<br><strong>Yellow Cards:</strong><br>`;
yellowCards.forEach(n=>summary+=`- ${n}<br>`);

document.getElementById("summary").innerHTML=summary;

saveState();

}

function resetStats(){

localStorage.removeItem("rugbyTrackerState");

location.reload();

}

function createButtons(containerId,labels){

const container=document.getElementById(containerId);

labels.forEach(label=>{

stats[label]=stats[label]||0;

const btn=document.createElement("button");

btn.textContent=label;

btn.className="stat-button"+(label==="Yellow Card"?" yellow-button":"");

btn.onclick=()=>{

if(label==="Yellow Card"){

showYellowCardPrompt();

}else{

stats[label]++;

actionHistory.push(label);

updateSummary();

}

};

container.appendChild(btn);

});

}

function showYellowCardPrompt(){

const container=document.createElement("div");

const dropdown=document.createElement("select");

dropdown.innerHTML=playerNames.map(name=>`<option value="${name}">${name}</option>`).join("");

const confirmBtn=document.createElement("button");

confirmBtn.textContent="Confirm";

confirmBtn.onclick=()=>{

const selected=dropdown.value;

yellowCards.push(selected);

actionHistory.push("Yellow Card: "+selected);

updateSummary();

document.body.removeChild(container);

};

const cancelBtn=document.createElement("button");

cancelBtn.textContent="Cancel";

cancelBtn.onclick=()=>document.body.removeChild(container);

container.style.position="fixed";
container.style.top="30%";
container.style.left="50%";
container.style.transform="translate(-50%, -50%)";
container.style.background="#fff";
container.style.padding="20px";
container.style.border="2px solid #ccc";
container.style.zIndex=999;

container.appendChild(dropdown);
container.appendChild(confirmBtn);
container.appendChild(cancelBtn);

document.body.appendChild(container);

}

function undoLast(){

const last=actionHistory.pop();

if(!last)return;

if(last.startsWith("Yellow Card:")){

yellowCards.pop();

}else if(stats[last]>0){

stats[last]--;

}

updateSummary();

}

function shareSummary(){

const summaryText=document.getElementById("summary").innerText;

window.open(`https://wa.me/?text=${encodeURIComponent(summaryText)}`,'_blank');

}

createButtons("penaltyButtons",penalties);
createButtons("otherButtons",[...otherStats,"Yellow Card"]);

["homeTeam","awayTeam","gameDate","homeScore","awayScore"].forEach(id=>{
document.getElementById(id).addEventListener("input",updateSummary);
});

loadState();

</script>

</body>
</html>
